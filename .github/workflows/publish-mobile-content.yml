name: Publish mobile content

on:
  push:
    branches: [main]
    paths:
      - "1-1000/**"
      - "1001-2000/**"
      - "2001-3000/**"
      - "3001-4000/**"
      - "category/**"
      - "images/**"
      - "tools/**"
      - ".github/workflows/publish-mobile-content.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install publisher dependency
        run: python -m pip install -r tools/requirements.txt

      - name: Validate content
        run: python tools/validate_content.py --content-root .

      - name: Test publisher tools
        run: python -m unittest discover -s tools/tests -v

      - name: Build package
        run: python tools/build_mobile_package.py --content-root . --content-version "${GITHUB_SHA}"

      - name: Verify checksums
        working-directory: generated-mobile-content
        run: sha256sum --check checksums.sha256

      - name: Publish GitHub-hosted mobile content
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"
          cp generated-mobile-content/manifest.json "$publish_dir/"
          cp generated-mobile-content/checksums.sha256 "$publish_dir/"
          cp -R generated-mobile-content/objects "$publish_dir/"
          git -C "$publish_dir" init
          git -C "$publish_dir" config user.name "github-actions[bot]"
          git -C "$publish_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$publish_dir" checkout -b mobile-content
          git -C "$publish_dir" add manifest.json checksums.sha256 objects
          git -C "$publish_dir" commit -m "Publish mobile content ${GITHUB_SHA}"
          git -C "$publish_dir" remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -C "$publish_dir" push --force origin HEAD:mobile-content

      - name: Publish to configured S3-compatible storage
        env:
          CONTENT_STORAGE_ENDPOINT: ${{ secrets.CONTENT_STORAGE_ENDPOINT }}
          CONTENT_STORAGE_ACCESS_KEY: ${{ secrets.CONTENT_STORAGE_ACCESS_KEY }}
          CONTENT_STORAGE_SECRET_KEY: ${{ secrets.CONTENT_STORAGE_SECRET_KEY }}
          CONTENT_STORAGE_BUCKET: ${{ secrets.CONTENT_STORAGE_BUCKET }}
          CONTENT_STORAGE_REGION: ${{ secrets.CONTENT_STORAGE_REGION }}
          CONTENT_PUBLIC_BASE_URL: ${{ secrets.CONTENT_PUBLIC_BASE_URL }}
        run: python tools/publish_package.py --input generated-mobile-content

      - name: Upload development fallback artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-content-${{ github.sha }}
          path: generated-mobile-content/
          if-no-files-found: error
          retention-days: 30
